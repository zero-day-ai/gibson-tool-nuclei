kind: tool
name: nuclei
version: 1.0.0
description: Template-based vulnerability scanner with CVE detection
author: Gibson Security Team
license: MIT
repository: https://github.com/zero-day-ai/gibson-tools-official

build:
  command: go build -o nuclei .
  artifacts:
    - nuclei
  workdir: .

runtime:
  type: go
  entrypoint: ./nuclei
  port: 0
  timeout:
    default: 5m
    min: 30s
    max: 30m

dependencies:
  gibson: ">=1.0.0"
  system:
    - nuclei  # nuclei must be installed
  env:
    required:
      - GIBSON_PLATFORM_URL
      - GIBSON_API_KEY
