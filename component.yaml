kind: tool
name: nuclei
version: 1.0.0
description: Template-based vulnerability scanner with CVE detection
author: Gibson Security Team
license: MIT
repository: https://github.com/zero-day-ai/gibson-tools-official

build:
  command: go build -o nuclei .
  artifacts:
    - nuclei
  workdir: .

runtime:
  type: go
  entrypoint: ./nuclei
  port: 0
  timeout:
    default: 5m
    min: 30s
    max: 30m

dependencies:
  gibson: ">=1.0.0"
  system:
    - nuclei  # nuclei must be installed
  env: {}

# Worker configuration for queue-based execution
worker:
  # Nuclei is I/O-bound (template execution and HTTP requests), so moderate concurrency is optimal.
  # Each scan can spawn multiple HTTP connections, so memory usage scales with concurrency.
  concurrency: 4

  # Allow up to 60 seconds for graceful shutdown since template scans can take time.
  shutdown_timeout: 60s

  # Heartbeat every 10 seconds to maintain health status
  heartbeat_interval: 10s
